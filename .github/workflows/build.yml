name: Build

# Builds the sdist and platform wheels as a packaging health check. Publishing
# to PyPI is intentionally not configured yet; add a publish job (with a PyPI
# trusted publisher) when releases are wanted.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # Build source distribution
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build SDist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Build wheels on multiple platforms.
  # Windows is intentionally omitted: the vendored CMU Sphinx C does not yet
  # build under MSVC (POSIX-only drand48 and several unresolved sphinx3_align
  # symbols). Restore windows-latest here once that portability work is done.
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
