# Named configurations for ST2
#
# Each config defines feature extraction and training parameters.
# Use: st2 build cd-8g --config wideband
#
# Paths use config name: shared/features/wideband/, shared/models/cd-8g/wideband/
# Same config → same outputs → automatic sharing across experiments.

default:
  description: "Default wideband configuration"
  features:
    samprate: 16000
    ncep: 13
    nfilt: 40
    nfft: 512
    lowerf: 130
    upperf: 6800
    feat_type: "1s_c_d_dd"
  training:
    n_state: 3
    n_senones: 200
    max_iterations: 10

wideband:
  description: "Wideband (16kHz) microphone speech"
  features:
    samprate: 16000
    ncep: 13
    nfilt: 40
    nfft: 512
    lowerf: 130
    upperf: 6800
    feat_type: "1s_c_d_dd"
  training:
    n_state: 3
    n_senones: 200
    max_iterations: 10

telephone:
  description: "Telephone (8kHz) narrowband speech"
  features:
    samprate: 8000
    ncep: 13
    nfilt: 25
    nfft: 256
    lowerf: 200
    upperf: 3500
    feat_type: "1s_c_d_dd"
  training:
    n_state: 3
    n_senones: 200
    max_iterations: 10

wideband_large:
  description: "Wideband with more senones (larger datasets)"
  features:
    samprate: 16000
    ncep: 13
    nfilt: 40
    nfft: 512
    lowerf: 130
    upperf: 6800
    feat_type: "1s_c_d_dd"
  training:
    n_state: 3
    n_senones: 4000
    max_iterations: 10

sphinxtrain:
  description: "Matched to SphinxTrain defaults for comparison"
  features:
    samprate: 16000
    ncep: 13
    nfilt: 25
    nfft: 512
    lowerf: 130
    upperf: 6800
    alpha: 0.97
    lifter: 22
    feat_type: "1s_c_d_dd"
  training:
    n_state: 3
    n_senones: 200
    max_iterations: 10
